name: Migration Safety

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Migration Reversibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install TA-Lib C library from source
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y build-essential wget
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j2
          sudo make install
          cd ..
          rm -rf ta-lib-0.6.4 ta-lib-0.6.4-src.tar.gz
          sudo ldconfig

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt

      - name: Run Migration Reversibility Check
        run: python scripts/verify_migrations.py
