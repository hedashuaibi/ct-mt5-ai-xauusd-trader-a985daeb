name: Auto-Merge Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [main]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  enforce-policy:
    name: Enforce Auto-Merge Policy
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      risk_status: ${{ steps.risk-check.outputs.risk_status }}
      violated_categories: ${{ steps.risk-check.outputs.violated_categories }}
      has_tests: ${{ steps.compliance-check.outputs.has_tests }}
      has_docs: ${{ steps.compliance-check.outputs.has_docs }}
      source_modified: ${{ steps.compliance-check.outputs.source_modified }}
      observability_pass: ${{ steps.observability-check.outputs.observability_pass }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47

      - name: Check for High-Risk Files
        id: risk-check
        run: |
          # Define high-risk patterns and their categories as per strict policy
          declare -A PATTERNS
          PATTERNS["src/trading/executor.py"]="Live Trading Execution Logic"
          PATTERNS["src/trading/mt5_connector.py"]="Live Trading Execution Logic"
          PATTERNS["src/core/risk_engine.py"]="Risk Parameters / Position Sizing"
          PATTERNS["src/trading/risk_engine.py"]="Risk Parameters / Position Sizing"
          PATTERNS["src/trading/risk_manager.py"]="Risk Parameters / Position Sizing"
          PATTERNS["src/trading/audited_risk_manager.py"]="Risk Parameters / Position Sizing"
          PATTERNS["src/trading/capital_allocator.py"]="Risk Parameters / Position Sizing"
          PATTERNS["src/trading/execution_filter.py"]="Risk Parameters / Position Sizing"
          PATTERNS["config/secrets.*"]="Credentials / Auth Surface"
          PATTERNS[".env.*"]="Credentials / Auth Surface"
          PATTERNS["src/core/config.py"]="Credentials / Auth Surface"
          PATTERNS["Dockerfile"]="Docker / Infrastructure Control"
          PATTERNS["docker-compose.yml"]="Docker / Infrastructure Control"
          PATTERNS[".github/workflows/deploy.*"]="CI/CD Deployment Workflows"
          PATTERNS["migrations/.*"]="Database Migrations"

          TOUCHED_HIGH_RISK=false
          VIOLATED_CATEGORIES=()

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            for pattern in "${!PATTERNS[@]}"; do
              if [[ "$file" =~ $pattern ]]; then
                echo "🚨 HIGH-RISK FILE DETECTED: $file (Category: ${PATTERNS[$pattern]})"
                TOUCHED_HIGH_RISK=true
                # Add category to list if not already present
                PRESENT=false
                for cat in "${VIOLATED_CATEGORIES[@]}"; do
                  if [[ "$cat" == "${PATTERNS[$pattern]}" ]]; then
                    PRESENT=true
                    break
                  fi
                done
                if [ "$PRESENT" = "false" ]; then
                  VIOLATED_CATEGORIES+=("${PATTERNS[$pattern]}")
                fi
              fi
            done
          done

          if [ "$TOUCHED_HIGH_RISK" = "true" ]; then
            # Join categories with comma
            JOINED_CATS=$(IFS=','; echo "${VIOLATED_CATEGORIES[*]}")
            echo "violated_categories=$JOINED_CATS" >> $GITHUB_OUTPUT
            echo "risk_status=blocked" >> $GITHUB_OUTPUT
            echo "::error::High-risk files touched. Auto-merge is strictly PROHIBITED and must be ESCALATED."
          else
            echo "risk_status=pass" >> $GITHUB_OUTPUT
            echo "✅ No high-risk files detected."
          fi

      - name: Check for Tests and Documentation
        id: compliance-check
        run: |
          HAS_TESTS=false
          HAS_DOCS=false
          SOURCE_MODIFIED=false
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" =~ ^tests/ ]]; then HAS_TESTS=true; fi
            if [[ "$file" =~ ^docs/ || "$file" =~ \.md$ ]]; then HAS_DOCS=true; fi
            if [[ "$file" =~ ^src/ || "$file" == "main.py" ]]; then SOURCE_MODIFIED=true; fi
          done

          echo "has_tests=$HAS_TESTS" >> $GITHUB_OUTPUT
          echo "has_docs=$HAS_DOCS" >> $GITHUB_OUTPUT
          echo "source_modified=$SOURCE_MODIFIED" >> $GITHUB_OUTPUT

      - name: Check Observability Standards
        id: observability-check
        run: |
          BAD_LOGGING=false
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" =~ ^src/ ]]; then
              if grep -E "\bprint\(" "$file" | grep -v "console.print" > /dev/null; then
                echo "❌ OBSERVABILITY VIOLATION: Plain print statement found in $file"
                BAD_LOGGING=true
              fi
            fi
          done

          if [ "$BAD_LOGGING" = "true" ]; then
            echo "observability_pass=false" >> $GITHUB_OUTPUT
          else
            echo "observability_pass=true" >> $GITHUB_OUTPUT
          fi

      - name: Handle Violations & Escalation
        if: |
          steps.risk-check.outputs.risk_status == 'blocked' ||
          (steps.compliance-check.outputs.source_modified == 'true' &&
           (steps.compliance-check.outputs.has_tests == 'false' || steps.compliance-check.outputs.has_docs == 'false')) ||
          steps.observability-check.outputs.observability_pass == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REASON=$(cat <<EOF
          ### 🚨 Auto-Merge Policy Violation

          Auto-merge has been **BLOCKED** and this PR has been **ESCALATED** because the following criteria were not met:

          EOF
          )

          if [ "${{ steps.risk-check.outputs.risk_status }}" = "blocked" ]; then
            CATEGORIES="${{ steps.risk-check.outputs.violated_categories }}"
            REASON="$REASON
          - 🚨 **High-risk files modified in categories: $CATEGORIES.**"
            gh pr edit $PR_NUMBER --add-label "escalated-risk" || true
            # Fail the step to block auto-merge if risk status is blocked
            BLOCK_MERGE=true
          fi

          if [ "${{ steps.observability-check.outputs.observability_pass }}" = "false" ]; then
            REASON="$REASON
          - ❌ **Observability standards not met.** Plain 'print' statements found in \`src/\`. Use \`structlog\` or Rich \`console.print\`."
          fi

          if [ "${{ steps.compliance-check.outputs.source_modified }}" = "true" ]; then
            if [ "${{ steps.compliance-check.outputs.has_tests }}" = "false" ]; then
              REASON="$REASON
          - ❌ **Missing Tests.** Source code modified but no tests added/updated in \`tests/\`."
            fi
            if [ "${{ steps.compliance-check.outputs.has_docs }}" = "false" ]; then
              REASON="$REASON
          - ❌ **Missing Documentation.** Source code modified but no documentation updated in \`docs/\` or \`.md\` files."
            fi
          fi

          REASON="$REASON

          ---
          **Escalation Procedure:**
          1. A Lead Engineer must perform a deep-dive review.
          2. Manual verification in a staging environment is mandatory if trading/risk logic was touched.
          3. Two senior approvals are required to merge this PR."

          gh pr comment $PR_NUMBER --body "$REASON"
          gh pr merge $PR_NUMBER --disable-auto || true

          if [ "$BLOCK_MERGE" = "true" ]; then
            echo "::error::Strict policy violation: High-risk files detected. Manual approval and escalation required."
            exit 1
          fi

          echo "::error::Auto-merge policy violations detected. PR escalated."
          exit 1

  enable-auto-merge:
    name: Enable Auto-Merge
    needs: enforce-policy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v5
      - name: Enable Auto-Merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge $PR_NUMBER --auto --squash --delete-branch || echo "⚠️ Auto-merge could not be enabled."
