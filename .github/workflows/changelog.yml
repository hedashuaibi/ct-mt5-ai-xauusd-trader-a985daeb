name: Automated Changelog

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'main.py'
      - 'pyproject.toml'
      - 'requirements*.txt'

permissions:
  contents: write
  pull-requests: read

jobs:
  changelog:
    name: Update Unreleased Section
    runs-on: ubuntu-latest
    # Prevent recursive triggers and skip release/skip-ci commits
    if: |
      github.event.head_commit.message != '' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: release v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Get PR labels
        id: pr_labels
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              if (pullRequests.length > 0) {
                const labels = pullRequests[0].labels.map(l => l.name);
                console.log(`Found labels: ${labels.join(', ')}`);
                return labels.join(' ');
              }
            } catch (error) {
              console.error("Error fetching PR labels associated with commit:", error);
            }
            return '';
          result-encoding: string

      - name: Run Changelog Automation
        run: python scripts/update_changelog.py --labels "${{ steps.pr_labels.outputs.result }}"

      - name: Commit and Push Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update CHANGELOG.md [skip ci]"
            git push origin main
          else
            echo "No changes to CHANGELOG.md detected."
          fi
