name: Release Orchestration

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0). If empty, will be calculated from commits.'
        required: false
      prerelease:
        description: 'Is this a pre-release?'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (do not tag or publish)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # -----------------------------------------------------------
  # JOB 1: Validation - Quality, Security, Tests, Compliance, Governance
  # -----------------------------------------------------------
  validate:
    name: Release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache TA-Lib
        id: cache-talib
        uses: actions/cache@v4
        with:
          path: /usr/lib/libta_lib.*
          key: ${{ runner.os }}-talib-v0.6.4

      - name: Install TA-Lib C library
        if: steps.cache-talib.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y build-essential wget
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j2
          sudo make install
          cd ..
          rm -rf ta-lib-0.6.4 ta-lib-0.6.4-src.tar.gz
          sudo ldconfig

      - name: Install dependencies
        run: |
          pip install ruff==0.4.3 mypy==1.10.0 pip-audit==2.7.3 pip-licenses==5.5.5 pytest pytest-cov
          pip install -r requirements-ci.txt

      - name: Ruff Check
        run: ruff check src/ main.py scripts/ tests/

      - name: Ruff Format Check
        run: ruff format --check src/ main.py scripts/ tests/

      - name: Mypy Check
        run: mypy src/ main.py scripts/ --ignore-missing-imports

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Audit
        run: |
          pip-audit --requirement requirements.txt
          pip-audit --requirement requirements-ci.txt

      - name: License Compliance Check
        run: |
          # Install dependencies for license check
          ls requirements.txt requirements-ci.txt requirements-linux.txt 2>/dev/null | xargs -r cat | grep -vE "TA-Lib|MetaTrader5" | sort | uniq > requirements-all-scan.txt
          pip install -r requirements-all-scan.txt || true

          # Enforce allowed licenses according to docs/LICENSE_COMPLIANCE.md
          pip-licenses \
            --allow-only "MIT;BSD;Apache;MPL;LGPL;PSF;Unlicense;ISC;Other/Proprietary;UNKNOWN;Python;NVIDIA" \
            --partial-match \
            --ignore-packages pip pip-licenses prettytable wcwidth setuptools

          pip-licenses \
            --format=markdown \
            --output-file=docs/DEPENDENCY_LICENSES.md \
            --ignore-packages pip pip-licenses prettytable wcwidth setuptools

      - name: Verify Dependencies Harmonization
        run: python scripts/verify_dependencies.py

      - name: Run Tests with Coverage Gate (85%)
        run: pytest tests/ --cov=src --cov-report=xml --cov-fail-under=85
        env:
          MT5_LOGIN: "0"
          MT5_PASSWORD: "test"
          MT5_SERVER: "test"
          MODE: "demo"

      - name: Gate 4.8: Atlas Governance Audit
        run: python scripts/atlas_audit.py

      - name: Validate Environment Config
        run: python scripts/validate_env.py

      - name: Migration Reversibility Check
        run: python scripts/verify_migrations.py

      - name: Validate Release Notes
        run: python scripts/check_release_notes.py

      - name: Research & QA Vitals (Jules02 Integration)
        env:
          PYTHONPATH: .
        run: |
          python scripts/verify_hyperopt_walkforward.py
          python scripts/verify_stress_lab.py
          python scripts/verify_reporting_system.py
          python scripts/verify_rare_event_reporting.py
          python scripts/verify_benchmarking.py
          python scripts/verify_allocator_reporting.py
          python scripts/verify_backtest_audit.py
          python scripts/verify_journal_mining.py
          python scripts/verify_explainability_ui.py
          python scripts/verify_ux_terminal.py
          # Generate consolidated audit report
          python scripts/generate_research_report.py

      - name: Upload Research Reports
        uses: actions/upload-artifact@v4
        with:
          name: research-vitals-reports
          path: |
            walkforward_verification_report.md
            research_verification_report.md
            research_verification_report.html
            research_audit_report.md
            research_audit_report.html

      - name: Verify Version Synchronization
        run: python scripts/verify_version_sync.py

      - name: Reliability SLO Audit
        run: python scripts/verify_slos.py

      - name: Automated Pre-Prod Checklist Verification
        run: |
          CHECKLIST="docs/PREPROD_CHECKLIST.md"
          if [ ! -f "$CHECKLIST" ]; then
            echo "::error::PREPROD_CHECKLIST.md missing!"
            exit 1
          fi

          # Fail if there are any unchecked boxes [ ] (ignoring status choice line)
          if grep "\[ \]" "$CHECKLIST" | grep -v "\*\*Status:\*\*" | grep -q "\[ \]"; then
            echo "::error::Uncompleted items found in PREPROD_CHECKLIST.md. Release blocked."
            grep -n "\[ \]" "$CHECKLIST" | grep -v "\*\*Status:\*\*"
            exit 1
          fi
          echo "Pre-prod checklist validation passed."

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: docs/DEPENDENCY_LICENSES.md

  # -----------------------------------------------------------
  # JOB 2: Release - Tags, Build, Scan, Artifacts, GitHub Release
  # -----------------------------------------------------------
  release:
    name: Build & Create Release
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Release Tools
        run: |
          pip install pydantic pydantic-settings sqlalchemy alembic httpx tomli
          # Required for generate_config_docs.py, smoke_test.py, and package_release.sh validations

      - name: Calculate Next Version
        id: tag_action
        if: startsWith(github.ref, 'refs/tags/') == false && github.event.inputs.version == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          create_tag: false

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAG=$TAG" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
            echo "VERSION=${{ steps.tag_action.outputs.new_version }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ steps.tag_action.outputs.new_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Version and Changelog
        if: steps.version.outputs.IS_TAG == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # 1. Update unreleased section with latest commits
          python scripts/update_changelog.py

          # 2. Transition unreleased to versioned header
          chmod +x scripts/bump_version.py
          python scripts/bump_version.py "${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/__init__.py CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: release v${VERSION} [skip ci]"
            git push origin main
          fi

      - name: Create Git Tag
        if: steps.version.outputs.IS_TAG == 'false'
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: triqbit/mt5-ai-xauusd-trader:${{ steps.version.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: 'triqbit/mt5-ai-xauusd-trader:${{ steps.version.outputs.TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Final Runtime Smoke Test
        run: |
          echo "Starting the production-ready bot image for final smoke test..."

          # 1. Create a dummy .env
          cp .env.example .env
          sed -i 's/MT5_LOGIN=.*/MT5_LOGIN=999999/' .env
          sed -i 's/MT5_PASSWORD=.*/MT5_PASSWORD=test/' .env
          sed -i 's/MT5_SERVER=.*/MT5_SERVER=test/' .env
          sed -i 's/MODE=.*/MODE=demo/' .env

          # 2. Run the container
          docker run -d --name release-smoke-test \
            -p 8000:8000 \
            --env-file .env \
            triqbit/mt5-ai-xauusd-trader:${{ steps.version.outputs.TAG }} \
            --mode demo --algo ensemble

          # 3. Wait and verify using smoke_test.py
          python scripts/smoke_test.py --url http://localhost:8000 --retries 6 --delay 5 || {
            echo "::error::Final runtime smoke test failed. Inspecting container logs..."
            docker logs release-smoke-test
            exit 1
          }

          docker stop release-smoke-test
          docker rm release-smoke-test
          echo "SUCCESS: Final runtime smoke test passed."

      - name: Download Compliance Report
        uses: actions/download-artifact@v4
        with:
          name: compliance-report
          path: docs/

      - name: Download Research Reports
        uses: actions/download-artifact@v4
        with:
          name: research-vitals-reports
          path: .

      - name: Package Release Artifacts
        run: |
          chmod +x scripts/package_release.sh
          VERSION="${{ steps.version.outputs.VERSION }}"
          export VERSION
          export SKIP_DOCKER_BUILD=true
          ./scripts/package_release.sh

          # Build local artifact zip
          cd releases
          ZIP_NAME="mt5-ai-xauusd-trader-v${VERSION}.zip"
          zip -r "$ZIP_NAME" "v${VERSION}"
          CHECKSUM=$(sha256sum "$ZIP_NAME" | cut -d ' ' -f 1)
          echo "$CHECKSUM  $ZIP_NAME" > "checksums.txt"

          # Append Rollback Link and Integrity info to RELEASE_NOTES.md (which is the body of GH Release)
          {
            echo -e "\n\n## 🔐 Integrity & Verification"
            echo "- **SHA256**: \`${CHECKSUM}\`"
            echo "- **Artifact**: \`${ZIP_NAME}\`"
            echo -e "\n## 🔄 Rollback Procedures"
            echo "For detailed rollback and emergency procedures, refer to [RELEASE_PLAYBOOK.md](https://github.com/${{ github.repository }}/blob/main/docs/RELEASE_PLAYBOOK.md#6-rollback-procedures)"
            echo -e "\n### Quick Rollback (Docker)"
            echo "\`\`\`bash"
            echo "docker stop trading-bot"
            echo "docker run -d --name trading-bot triqbit/mt5-ai-xauusd-trader:<PREVIOUS_VERSION>"
            echo "\`\`\`"
          } >> "v${VERSION}/RELEASE_NOTES.md"

          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body_path: releases/v${{ steps.version.outputs.VERSION }}/RELEASE_NOTES.md
          files: |
            releases/mt5-ai-xauusd-trader-v${{ steps.version.outputs.VERSION }}.zip
            releases/checksums.txt
            docs/DEPENDENCY_LICENSES.md
            research_audit_report.md
            research_verification_report.md
            research_audit_report.html
            research_verification_report.html
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
