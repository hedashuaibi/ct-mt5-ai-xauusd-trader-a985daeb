name: Daily PR Triage

on:
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC = 17:00 GMT+4
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Generate PR Reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_triage_report.py
