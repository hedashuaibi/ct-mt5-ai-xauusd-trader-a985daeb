name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ===========================================================
# Self-enforcing CI:
# quality  -> ruff lint, ruff format check, import sort check
# security -> pip-audit vulnerability scan
# test     -> pytest with coverage
# docker   -> build image (main branch only)
# ===========================================================

jobs:

  # -----------------------------------------------------------
  # JOB 1: Code Quality - lint + format + imports
  # -----------------------------------------------------------
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality tools
        run: pip install ruff==0.4.3 mypy==1.10.0
      - name: Ruff lint (auto-fixable violations fail the build)
        run: ruff check src/ main.py
      - name: Ruff format (apply formatting)
        run: ruff format src/ main.py
      - name: Ruff format check (formatting enforced)
        run: ruff format --check src/ main.py
      - name: Import sort check (isort via ruff I-rules)
        run: ruff check --select I src/ main.py

  # -----------------------------------------------------------
  # JOB 2: Dependency Security - pip-audit CVE scan
  # -----------------------------------------------------------
  security:
    name: Dependency Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit dependencies for known CVEs
        run: pip-audit --requirement requirements-ci.txt --ignore-vuln GHSA-g8c6-8fjj-2r4m --ignore-vuln PYSEC-2024-277 --progress-spinner off
      - name: Verify dependency harmonization
        run: python scripts/verify_dependencies.py

  # -----------------------------------------------------------
  # JOB 3: Tests - needs quality + security to pass first
  # -----------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [quality, security]
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install TA-Lib C library from source
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y build-essential wget
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j2
          sudo make install
          cd ..
          rm -rf ta-lib-0.6.4 ta-lib-0.6.4-src.tar.gz
          sudo ldconfig
      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt
      - name: Bootstrap validation (Smoke Test)
        env:
          MT5_PASSWORD: "test"
          MT5_SERVER: "test"
        run: python main.py --show-config
      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-fail-under=80 -v
        env:
          MT5_LOGIN: "0"
          MT5_PASSWORD: "test"
          MT5_SERVER: "test"
          MODE: "demo"

  # -----------------------------------------------------------
  # JOB 4: Docker Build - only on main, needs tests to pass
  # -----------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and verify multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: triqbit/mt5-ai-xauusd-trader:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
