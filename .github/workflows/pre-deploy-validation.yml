name: Pre-Deployment Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Ensure only one validation runs at a time for a given PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # STAGE 1: Fast Fail - Quality, Secrets, Config, Compliance
  # -----------------------------------------------------------
  fast-validation:
    name: Fast Validation (Quality, Secrets, Config, Compliance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Validation Tools
        run: |
          pip install ruff==0.4.3 mypy==1.10.0 pip-audit==2.7.3 pip-licenses==5.5.5

      - name: "Gate 1: Ruff Lint & Mypy Type Check"
        run: |
          echo "Running Ruff checks..."
          ruff check src/ main.py scripts/ tests/ || { echo "::error title=Ruff Lint Failure::Ruff linting failed. Please fix violations."; exit 1; }
          ruff format --check src/ main.py scripts/ tests/ || { echo "::error title=Ruff Format Failure::Ruff formatting failed. Run 'ruff format .'"; exit 1; }
          echo "Running Mypy static analysis..."
          mypy src/ main.py scripts/ --ignore-missing-imports || { echo "::error title=Mypy Failure::Mypy type checks failed."; exit 1; }

      - name: "Gate 2: Secret Scanning (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: "Gate 3: Validate Environment Config Template"
        run: |
          echo "Verifying .env.example matches src/core/config.py..."
          python scripts/validate_env.py || { echo "::error title=Config Template Failure::Environment template validation failed. Sync .env.example with src/core/config.py"; exit 1; }

      - name: "Gate 4: Release Notes & Version Synchronization"
        run: |
          echo "Checking CHANGELOG.md for [Unreleased] content..."
          python scripts/check_release_notes.py || { echo "::error title=Release Notes Failure::Release notes validation failed. Add your changes to the [Unreleased] section in CHANGELOG.md"; exit 1; }
          echo "Verifying version consistency across metadata..."
          python scripts/verify_version_sync.py || { echo "::error title=Version Sync Failure::Version synchronization failed. Ensure pyproject.toml, src/__init__.py, and CHANGELOG.md are aligned."; exit 1; }

          echo "Verifying docs/PREPROD_CHECKLIST.md has no uncompleted items..."
          CHECKLIST="docs/PREPROD_CHECKLIST.md"
          if [ ! -f "$CHECKLIST" ]; then
            echo "::error title=Checklist Missing::PREPROD_CHECKLIST.md missing!"
            exit 1
          fi
          if grep -q "\[ \]" "$CHECKLIST"; then
            echo "::error title=Checklist Incomplete::Uncompleted items found in PREPROD_CHECKLIST.md. Deployment blocked."; grep -n "\[ \]" "$CHECKLIST"; exit 1
          fi

      - name: "Gate 4.8: Atlas Governance Audit"
        run: |
          echo "Running Atlas Governance Audit (Risk Sync, Runbooks, Governance Vitals)..."
          python scripts/atlas_audit.py || { echo "::error title=Governance Audit Failure::Atlas governance audit failed. Check RISK_LIMITS.md sync, runbook integrity, and checklist completion."; exit 1; }

      - name: "Gate 5: Security Audit & Dependency Harmonization"
        run: |
          echo "Scanning dependencies for vulnerabilities..."
          pip-audit --requirement requirements-ci.txt || { echo "::error title=Security Audit Failure::Security vulnerabilities found in CI requirements."; exit 1; }
          pip-audit --requirement requirements.txt || { echo "::error title=Security Audit Failure::Security vulnerabilities found in production requirements."; exit 1; }
          echo "Verifying overlapping dependencies are harmonized..."
          python scripts/verify_dependencies.py || { echo "::error title=Dependency Harmonization Failure::Dependency mismatch detected across requirements files. Harmonize versions."; exit 1; }

      - name: "Gate 6: License Compliance Check"
        run: |
          echo "Verifying third-party licenses meet enterprise policy..."
          # Optimized: Use CPU-only torch to save time during license scan
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          ls requirements.txt requirements-ci.txt requirements-linux.txt 2>/dev/null | xargs -r cat | grep -vE "TA-Lib|MetaTrader5|metaapi-cloud-sdk" | sort | uniq > requirements-all-scan.txt
          pip install -r requirements-all-scan.txt || true
          pip-licenses \
            --from=all \
            --allow-only "MIT;BSD;Apache;MPL;LGPL;PSF;Unlicense;ISC;Other/Proprietary;UNKNOWN;Python;NVIDIA;Dual License" \
            --partial-match \
            --ignore-packages pip pip-licenses prettytable wcwidth setuptools wheel || { echo "::error title=License Compliance Failure::Prohibited licenses detected. Check docs/LICENSE_COMPLIANCE.md"; exit 1; }

  # -----------------------------------------------------------
  # STAGE 2: Functional - Migrations, Tests & Coverage
  # -----------------------------------------------------------
  functional-validation:
    name: Functional Validation (Tests & Migrations)
    runs-on: ubuntu-latest
    needs: fast-validation
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache TA-Lib
        id: cache-talib
        uses: actions/cache@v4
        with:
          path: /usr/lib/libta_lib.*
          key: ${{ runner.os }}-talib-v0.6.4

      - name: Install TA-Lib C library
        if: steps.cache-talib.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y build-essential wget
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j2
          sudo make install
          cd ..
          rm -rf ta-lib-0.6.4 ta-lib-0.6.4-src.tar.gz
          sudo ldconfig

      - name: Install Dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r requirements-ci.txt

      - name: "Gate 7: Database Migration Reversibility Check"
        run: |
          echo "Verifying database migrations (up/down/up cycle)..."
          python scripts/verify_migrations.py || { echo "::error title=Migration Failure::Migration reversibility check failed. Verify your Alembic scripts."; exit 1; }

      - name: "Gate 8: Run Tests with Coverage Gate (85%)"
        run: |
          echo "Running unit and integration tests..."
          pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=85 || { echo "::error title=Test/Coverage Failure::Tests failed or coverage below 85% gate."; exit 1; }
        env:
          MT5_LOGIN: "0"
          MT5_PASSWORD: "test"
          MT5_SERVER: "test"
          MODE: "demo"

  # -----------------------------------------------------------
  # STAGE 3: Artifact - Docker Build & Vulnerability Scan
  # -----------------------------------------------------------
  artifact-validation:
    name: Artifact Validation (Docker & Security)
    runs-on: ubuntu-latest
    needs: functional-validation
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: "Gate 9: Build Docker Image"
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: triqbit/mt5-ai-xauusd-trader:validation-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Gate 10: Run Trivy Vulnerability Scanner"
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: 'triqbit/mt5-ai-xauusd-trader:validation-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: "Gate 11: Runtime Smoke Test (Containerized)"
        run: |
          echo "Starting the containerized bot for runtime validation..."
          cp .env.example .env
          sed -i 's/MT5_LOGIN=.*/MT5_LOGIN=999999/' .env
          sed -i 's/MT5_PASSWORD=.*/MT5_PASSWORD=test/' .env
          sed -i 's/MT5_SERVER=.*/MT5_SERVER=test/' .env
          sed -i 's/MODE=.*/MODE=demo/' .env

          docker run -d --name validation-bot \
            -p 8000:8000 \
            --env-file .env \
            triqbit/mt5-ai-xauusd-trader:validation-${{ github.sha }} \
            --mode demo --algo ensemble

          # Install httpx for the smoke test script
          pip install httpx

          echo "Executing scripts/smoke_test.py..."
          python scripts/smoke_test.py --url http://localhost:8000 --retries 6 --delay 10 || {
            echo "::error title=Runtime Smoke Test Failure::Runtime smoke test failed. Inspecting container logs..."
            docker logs validation-bot
            exit 1
          }
          echo "SUCCESS: Runtime smoke test passed."

      - name: "Cleanup Validation Container"
        if: always()
        run: |
          docker stop validation-bot || true
          docker rm validation-bot || true
